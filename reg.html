<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkwell — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #faf6ef;
    --warm: #c8956c;
    --warm-light: #e8c9a8;
    --sepia: #8b6f47;
    --sepia-light: #d4b896;
    --cream: #f5ede0;
    --shadow: rgba(26,18,8,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background-color: var(--cream);
    background-image:
      radial-gradient(ellipse at 80% 10%, rgba(200,149,108,0.12) 0%, transparent 55%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238b6f47' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'Lato', sans-serif;
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--paper);
    box-shadow: 0 20px 60px var(--shadow);
    border-radius: 4px;
    overflow: hidden;
  }

  .card-header {
    background: var(--ink);
    padding: 36px 48px;
    text-align: center;
    position: relative;
    background-image: radial-gradient(ellipse at 50% 100%, rgba(200,149,108,0.2) 0%, transparent 60%);
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--warm), var(--sepia-light), var(--warm), transparent);
  }

  .card-header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--paper);
    font-size: 28px;
    margin-bottom: 4px;
  }

  .card-header p {
    color: var(--sepia-light);
    font-size: 13px;
    letter-spacing: 1px;
    font-weight: 300;
  }

  .card-body {
    padding: 40px 48px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sepia);
    margin-bottom: 7px;
  }

  input[type="text"],
  input[type="number"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--sepia-light);
    border-radius: 2px;
    background: white;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--warm);
    box-shadow: 0 0 0 3px rgba(200,149,108,0.15);
  }

  .gender-group {
    display: flex;
    gap: 16px;
    margin-top: 4px;
  }

  .gender-option {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 9px 18px;
    border: 1.5px solid var(--sepia-light);
    border-radius: 2px;
    transition: all 0.2s;
    flex: 1;
    justify-content: center;
    background: white;
  }

  .gender-option:has(input:checked) {
    border-color: var(--warm);
    background: rgba(200,149,108,0.08);
  }

  .gender-option input { display: none; }

  .gender-option span {
    font-size: 13px;
    color: var(--sepia);
    font-weight: 400;
  }

  .gender-option:has(input:checked) span { color: var(--ink); font-weight: 700; }

  .divider {
    border: none;
    border-top: 1px dashed var(--sepia-light);
    margin: 8px 0 22px;
    opacity: 0.5;
  }

  .btn-register {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 2px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }

  .btn-register:hover { background: var(--sepia); }

  .login-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--sepia);
  }

  .login-link a {
    color: var(--warm);
    text-decoration: none;
    font-weight: 700;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .login-link a:hover { border-bottom-color: var(--warm); }

  #message {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 2px;
    font-size: 13px;
    display: none;
  }

  #message.error  { background: #fdf0f0; color: #c0392b; border-left: 3px solid #c0392b; display: block; }
  #message.success { background: #f0fdf4; color: #27ae60; border-left: 3px solid #27ae60; display: block; }

  @media (max-width: 480px) {
    .card-body { padding: 30px 24px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>✒️ Create Account</h1>
    <p>Begin your journaling journey</p>
  </div>

  <div class="card-body">
    <div class="form-row">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="number" id="phone" placeholder="10-digit number">
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label>Gender</label>
      <div class="gender-group">
        <label class="gender-option">
          <input type="radio" name="gender" value="male">
          <span>♂ Male</span>
        </label>
        <label class="gender-option">
          <input type="radio" name="gender" value="female">
          <span>♀ Female</span>
        </label>
      </div>
    </div>

    <hr class="divider">

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a unique username">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create password">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password">
      </div>
    </div>

    <button class="btn-register" onclick="submitForm()">Create My Account</button>
    <div id="message"></div>

    <div class="login-link">
      Already have an account? <a href="LOGIN.html">Sign in</a>
    </div>
  </div>
</div>

<script>
  async function submitForm() {
    const name            = document.getElementById('name').value.trim();
    const phone           = document.getElementById('phone').value.trim();
    const email           = document.getElementById('email').value.trim();
    const username        = document.getElementById('username').value.trim();
    const password        = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const genderEl        = document.querySelector('input[name="gender"]:checked');
    const msgEl           = document.getElementById('message');

    msgEl.className = ''; msgEl.style.display = 'none';

    if (!name || !phone || !email || !username || !password || !confirmPassword) {
      msgEl.className = 'error'; msgEl.textContent = 'Please fill in all fields.'; return;
    }
    if (!genderEl) {
      msgEl.className = 'error'; msgEl.textContent = 'Please select a gender.'; return;
    }
    if (password !== confirmPassword) {
      msgEl.className = 'error'; msgEl.textContent = 'Passwords do not match.'; return;
    }

    try {
      const res = await fetch('http://localhost:3000/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email, gender: genderEl.value, username, password })
      });
      const data = await res.json();

      if (res.ok) {
        msgEl.className = 'success';
        msgEl.textContent = 'Account created! Redirecting to login…';
        setTimeout(() => window.location.href = 'LOGIN.html', 1500);
      } else {
        msgEl.className = 'error';
        msgEl.textContent = data.message || 'Registration failed.';
      }
    } catch {
      msgEl.className = 'error';
      msgEl.textContent = 'Cannot connect to server. Make sure the backend is running.';
    }
  }
</script>
</body>
</html>
